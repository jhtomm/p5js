<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 전시회</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    /* 1. 미술관의 어두운 전시장 분위기 (Deep Black) */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 24px;
      background: #0a0a0c; /* 깊이감 있는 극다크 톤 */
      color: #e2e8f0;
    }

    /* 2. 전시장 타이틀 & 서체 */
    h1 {
      margin-bottom: 12px;
      font-size: 2.2rem;
      font-weight: 300; /* 미술관 특유의 얇고 고급스러운 서체 느낌 */
      letter-spacing: 0.1em; /* 자간을 넓혀 전시장 분위기 연출 */
      text-transform: uppercase;
      color: #ffffff;
      text-align: center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 60px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* 3. 전시 그리드 (액자 사이 여백을 여유롭게) */
    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 900px;
      gap: 48px; /* 액자와 액자 사이 거리를 넓혀 쾌적하게 배치 */
    }

    /* 4. 미술관 갤러리 액자(Frame) 디자인 */
    #projects .frame {
      background: #18181b; /* 액자 내부 매트(Matte) 보드 색상 */
      border: 14px solid #27272a; /* 1) 두꺼운 프레임 테두리 */
      border-image: linear-gradient(to bottom right, #3f3f46, #18181b, #09090b) 1; /* 2) 테두리에 은은한 금속/원목 입체감 부여 */
      padding: 20px; /* 3) 작품 주위 여백 (매트 효과) */
      
      /* 4) 하단 조명을 받는 듯한 갤러리풍 대형 그림자 */
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.7),
        inset 0 2px 4px rgba(255, 255, 255, 0.05); 
        
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 액자 호버 효과: 관람객이 다가서서 보는 듯한 느낌 */
    #projects .frame:hover {
      transform: scale(1.03) translateY(-4px); /* 살짝 앞으로 다가옴 */
      border-image: linear-gradient(to bottom right, #52525b, #27272a, #18181b) 1; /* 테두리 하이라이트 경쾌하게 변화 */
      box-shadow: 
        0 35px 60px -10px rgba(0, 0, 0, 0.9), 
        0 0 20px rgba(99, 102, 241, 0.15); /* 은은한 후광 */
    }

    /* 5. [수정] 캔버스 컨테이너 크기를 가로 396px, 세로 264px (3:2 비율)로 완전히 고정 */
    .canvas-container {
      width: 396px;
      height: 264px;
      position: relative;
      overflow: hidden;
      background: #000;
      box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.9);
      border: 1px solid #09090b;
      margin: 0 auto; /* 액자 내부에서 가운데 정렬 */
    }

    /* [수정] 원래 크기인 600x400을 정확히 0.66배 축소하여 396x264 캔버스에 박아넣음 */
    #projects .canvas-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      transform: scale(0.66); /* 600px * 0.66 = 396px (오차 없이 딱 맞춤) */
    }

    /* 6. 미술관 작품 네임택 (캡션) 스타일 */
    .frame-caption {
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px dashed #2f2f35; /* 작품과 설명 구분선 */
      text-align: center; /* 실제 미술관 명패처럼 중앙 정렬 */
    }

    .frame-caption h2 {
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: #f4f4f5;
      margin-bottom: 4px;
    }

    .frame-caption p {
      font-size: 0.75rem;
      font-weight: 300;
      color: #71717a;
    }
  </style>
</head>
<body>

  <h1>P5.js Exhibition</h1>
  <p class="subtitle">Interactive Digital Art Gallery</p>
  
  <main id="projects">

    <div class="frame">
      <div class="canvas-container">
        <iframe src="sample1/index.html"></iframe>
      </div>
      <div class="frame-caption">
        <h2>Abstract art</h2>
      </div>
    </div>

    <div class="frame">
      <div class="canvas-container">
        <iframe src="sample4/index.html"></iframe>
      </div>
      <div class="frame-caption">
        <h2>Moving Abstract art</h2>
      </div>
    </div>

    <div class="frame">
      <div class="canvas-container">
        <iframe src="sample2/index.html"></iframe>
      </div>
      <div class="frame-caption">
        <h2>Caricature</h2>
      </div>
    </div>

    <div class="frame">
      <div class="canvas-container">
        <iframe src="sample3/index.html"></iframe>
      </div>
      <div class="frame-caption">
        <h2>Moving Caricature</h2>
      </div>
    </div>

  </main>

</body>
</html>
