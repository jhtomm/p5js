<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 전시회</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }

    /* 1. 미술관의 어두운 전시장 분위기 (Deep Black) */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 60px 24px;
      background: #0a0a0c; /* 깊이감 있는 극다크 톤 */
      color: #e2e8f0;
    }

    /* 2. 전시장 타이틀 & 서체 */
    h1 {
      margin-bottom: 12px;
      font-size: 2.2rem;
      font-weight: 300; /* 미술관 특유의 얇고 고급스러운 서체 느낌 */
      letter-spacing: 0.1em; /* 자간을 넓혀 전시장 분위기 연출 */
      text-transform: uppercase;
      color: #ffffff;
      text-align: center;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 60px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    /* 3. 전시 그리드 (액자 사이 여백을 여유롭게) */
    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 900px;
      gap: 48px; /* 액자와 액자 사이 거리를 넓혀 쾌적하게 배치 */
    }

    /* 4. [핵심] 미술관 갤러리 액자(Frame) 디자인 */
    #projects .frame {
      background: #18181b; /* 액자 내부 매트(Matte) 보드 색상 */
      border: 14px solid #27272a; /* 1) 두꺼운 프레임 테두리 */
      border-image: linear-gradient(to bottom right, #3f3f46, #18181b, #09090b) 1; /* 2) 테두리에 은은한 금속/원목 입체감 부여 */
      padding: 20px; /* 3) 작품 주위 여백 (매트 효과) */
      
      /* 4) 하단 조명을 받는 듯한 갤러리풍 대형 그림자 */
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.7),
        inset 0 2px 4px rgba(255, 255, 255, 0.05); 
        
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* 액자 호버 효과: 관람객이 다가서서 보는 듯한 느낌 */
    #projects .frame:hover {
      transform: scale(1.03) translateY(-4px); /* 살짝 앞으로 다가옴 */
      border-image: linear-gradient(to bottom right, #52525b, #27272a, #18181b) 1; /* 테두리 하이라이트 경쾌하게 변화 */
      box-shadow: 
        0 35px 60px -10px rgba(0, 0, 0, 0.9), 
        0 0 20px rgba(99, 102, 241, 0.15); /* 은은한 후광 */
    }
