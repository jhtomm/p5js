<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p5.js 작품 모음</title>
  <style>
    /* 1. 기본 초기화 및 부드러운 폰트 설정 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    }

    /* 2. 어두운 배경으로 미디어 아트 몰입도 증가 */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 24px;
      background: #0f172a; /* 고급스러운 네이비 블랙 */
      color: #f8fafc;
    }

    /* 3. 타이틀 스타일링 */
    h1 {
      margin-bottom: 8px;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #38bdf8, #818cf8); /* 트렌디한 그라데이션 */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* 4. 그리드 레이아웃 유지 및 확장 */
    #projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%;
      max-width: 800px; /* 살짝 넓혀서 시원하게 배치 */
      gap: 24px; /* 여백을 넓혀 답답함 해소 */
    }

    /* 5. 작품 카드 디자인 변경 */
    #projects .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease; /* 부드러운 애니메이션 */
    }

    /* 마우스 호버 시 인터랙션 효과 */
    #projects .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      border-color: #6366f1; /* 호버 시 테두리 색상 강조 */
    }

    /* iframe을 담는 뷰포트 (기존 cell 역할) */
    .canvas-container {
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #projects .canvas-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 600px;
      height: 400px;
      border: none;
      transform-origin: top left;
      transform: scale(0.5); /* 기존 scale 0.5 유지 */
    }

    /* 6. 작품 설명 영역 추가 */
    .card-info {
      padding: 16px;
    }

    .card-info h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: #f1f5f9;
    }

    .card-info p {
      font-size: 0.85rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <h1>나의 p5.js Creative Coding</h1>
  <p class="subtitle">p5.js 라이브러리를 활용한 인터랙티브 그래픽 작업물 모음</p>

  <main id="projects">

    <div class="card">
      <div class="canvas-container">
        <iframe src="sample1/index.html"></iframe>
      </div>
      <div class="card-info">
        <h2>Artwork 01</h2>
        <p>프로젝트에 대한 간단한 기획 의도나 기술 설명</p>
      </div>
    </div>

    <div class="card">
      <div class="canvas-container">
        <iframe src="sample4/index.html"></iframe>
      </div>
      <div class="card-info">
        <h2>Artwork 02</h2>
        <p>마우스를 움직이거나 클릭 시 반응하는 인터랙티브 아트</p>
      </div>
    </div>

    <div class="card">
      <div class="canvas-container">
        <iframe src="sample2/index.html"></iframe>
      </div>
      <div class="card-info">
        <h2>Artwork 03</h2>
        <p>수학적 알고리즘을 이용한 시각 패턴 구현</p>
      </div>
    </div>

    <div class="card">
      <div class="canvas-container">
        <iframe src="sample3/index.html"></iframe>
      </div>
      <div class="card-info">
        <h2>Artwork 04</h2>
        <p>p5.js의 다양한 렌더링 기능을 실험한 작업</p>
      </div>
    </div>

  </main>

</body>
</html>
